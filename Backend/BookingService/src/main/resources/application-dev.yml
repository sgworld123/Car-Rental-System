spring:
  application:
    name: BOOKINGSERVICE

  cache:
    type: redis

  data:
    mongodb:
      uri: mongodb://root:root@mongodb:27017/CarRentalSystem?authSource=admin

    redis:
      host: redis
      port: 6379

  #RabbitMq
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8083

eureka:
  instance:
    ip-address: booking-service
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/