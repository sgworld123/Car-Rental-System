spring:
  application:
    name: AGENCYSERVICE

  cache:
    type: redis

  data:
    mongodb:
      uri: mongodb://root:root@mongodb:27017/CarRentalSystem?authSource=admin

    redis:
      host: redis
      port: 6379

server:
  port: 8082

eureka:
  instance:
    ip-address: agency-service
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/