spring:
  application:
    name: AGENCYSERVICE

  cache:
    type: redis

    mongodb:
      uri: mongodb://root:root@localhost:27017/CarRentalSystem?authSource=admin

    redis:
      host: localhost
      port: 6379

server:
  port: 8082

eureka:
  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/