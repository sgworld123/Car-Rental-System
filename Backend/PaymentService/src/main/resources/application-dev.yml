spring:
  application:
    name: PAYMENTSERVICE

  data:
    mongodb:
      uri: mongodb://root:root@mongodb:27017/CarRentalSystem?authSource=admin

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

server:
  port: 8085

eureka:
  instance:
    ip-address: payment-service
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/