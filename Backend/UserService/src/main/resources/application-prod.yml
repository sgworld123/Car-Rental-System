spring:
  application:
    name: USERSERVICE

  data:
    mongodb:
      uri: ${USER_MONGODB_URI}

server:
  port: 8081

eureka:
  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secretKey: ${JWT_SECRET_KEY}