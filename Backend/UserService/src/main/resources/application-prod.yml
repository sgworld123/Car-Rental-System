spring:
  application:
    name: USERSERVICE

  data:
    mongodb:
      uri: ${MONGODB_URI}

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

eureka:
  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secretKey: ${JWT_SECRET_KEY}